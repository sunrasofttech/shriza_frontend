<div class="forgot-page">

  <div class="forgot-card">

    <div class="card-blob"></div>

    <div class="brand-logo">
      <svg width="56" height="56" viewBox="0 0 56 56" fill="none">
        <path d="M28 4C16 10 14 20 22 28C30 20 28 10 28 4Z" fill="#1f5fa8" />
        <path d="M28 52C28 38 22 28 10 24C10 38 16 48 28 52Z" fill="#0d7644" />
        <path d="M28 52C28 38 34 28 46 24C46 38 40 48 28 52Z" fill="#e08a2e" />
        <path d="M44 6l1.6 4 4 1.6-4 1.6-1.6 4-1.6-4-4-1.6 4-1.6Z" fill="#f3a72e" />
      </svg>
      <span class="brand-text">
        <strong>SHRIZA</strong>
        <small>NATURALS</small>
      </span>
    </div>

    <!-- STEP 1: EMAIL -->
    <ng-container *ngIf="step === 'email'">

      <h2>Reset Password</h2>
      <p class="subtitle">
        Enter your email address and we'll send you a verification code.
      </p>

      <form (ngSubmit)="sendOtpCode()">

        <div class="form-group">

          <label>Email Address</label>

          <div class="input-icon">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none">
              <rect x="3" y="5" width="18" height="14" rx="2.4" stroke="#8a978a" stroke-width="1.6" />
              <path d="M4 7l8 6 8-6" stroke="#8a978a" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            <input
              type="email"
              [(ngModel)]="email"
              name="email"
              placeholder="name@example.com">
          </div>

        </div>

        <button type="submit" class="primary-btn">
          Send OTP Code
        </button>

      </form>

    </ng-container>

    <!-- STEP 2: OTP -->
    <ng-container *ngIf="step === 'otp'">

      <h2>Verify OTP</h2>
      <p class="subtitle">
        Enter the 4-digit OTP sent to your registered email:<br>
        {{ email || 'user@email.com' }}
      </p>

      <form (ngSubmit)="verifyOtp()">

        <div class="form-group">

          <label>OTP Verification Code</label>

          <div class="input-icon">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none">
              <circle cx="8" cy="15" r="4" stroke="#8a978a" stroke-width="1.6" />
              <path d="M11 12l8-8M16 7l2 2M13 10l2 2" stroke="#8a978a" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            <input
              type="text"
              [(ngModel)]="otp"
              name="otp"
              placeholder="Enter 1234">
          </div>

        </div>

        <div class="resend-row">
          <span>Didn't receive the OTP?</span>
          <a (click)="resendCode()">Resend Code</a>
        </div>

        <button type="submit" class="primary-btn">
          Verify OTP
        </button>

      </form>

    </ng-container>

    <!-- STEP 3: NEW PASSWORD -->
    <ng-container *ngIf="step === 'password'">

      <h2>New Password</h2>
      <p class="subtitle">
        Choose a secure, strong password for your account.
      </p>

      <form (ngSubmit)="updatePassword()">

        <div class="form-group">

          <label>New Password</label>

          <div class="input-icon">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none">
              <rect x="5" y="10" width="14" height="10" rx="2.2" stroke="#8a978a" stroke-width="1.6" />
              <path d="M8 10V7a4 4 0 0 1 8 0v3" stroke="#8a978a" stroke-width="1.6" />
            </svg>
            <input
              type="password"
              [(ngModel)]="newPassword"
              name="newPassword"
              placeholder="••••••••">
          </div>

        </div>

        <div class="form-group">

          <label>Confirm New Password</label>

          <div class="input-icon">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none">
              <rect x="5" y="10" width="14" height="10" rx="2.2" stroke="#8a978a" stroke-width="1.6" />
              <path d="M8 10V7a4 4 0 0 1 8 0v3" stroke="#8a978a" stroke-width="1.6" />
            </svg>
            <input
              type="password"
              [(ngModel)]="confirmPassword"
              name="confirmPassword"
              placeholder="••••••••">
          </div>

        </div>

        <button type="submit" class="primary-btn">
          Update Password
        </button>

      </form>

    </ng-container>

    <div class="divider"></div>

    <button class="back-link" (click)="backToLogin()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
        <path d="M19 12H5M11 6l-6 6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
      Back to Login
    </button>

  </div>

</div>
